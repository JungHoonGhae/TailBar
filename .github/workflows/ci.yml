name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  release:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build Release
        run: swift build -c release

      - name: Create archive
        run: |
          mkdir -p dist
          cp -R .build/release/TailBar dist/
          cd dist && zip -r "TailBar-${TAG_NAME}.zip" TailBar

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TailBar-${{ github.ref_name }}.zip
          generate_release_notes: true
