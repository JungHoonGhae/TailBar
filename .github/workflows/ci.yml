name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  release:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build Release
        run: swift build -c release

      - name: Create archive
        run: |
          mkdir -p dist
          cp -R .build/release/TailBar dist/
          cd dist && zip -r "TailBar-${TAG_NAME}.zip" TailBar

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TailBar-${{ github.ref_name }}.zip
          generate_release_notes: true

      - name: Compute SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 dist/TailBar-${TAG_NAME}.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Fetch Homebrew token
        id: doppler
        run: |
          set -euo pipefail
          TOKEN=$(doppler secrets get HOMEBREW_TAP_TOKEN --plain 2>/dev/null)
          if [ -z "$TOKEN" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN not found in Doppler"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "HOMEBREW_TAP_TOKEN=$TOKEN" >> "$GITHUB_OUTPUT"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Update Homebrew tap
        env:
          TAG: ${{ github.ref_name }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
          REPO: ${{ github.repository }}
          TAP_TOKEN: ${{ steps.doppler.outputs.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/JungHoonGhae/homebrew-tailbar.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          mkdir -p Formula
          cat > Formula/tailbar.rb <<FORMULA
          class Tailbar < Formula
            desc "Tailscale management menu bar app for macOS"
            homepage "https://github.com/${REPO}"
            url "https://github.com/${REPO}/releases/download/${TAG}/TailBar-${TAG}.zip"
            sha256 "${SHA256}"
            license "MIT"

            depends_on :macos

            def install
              bin.install "TailBar" => "tailbar"
            end

            def caveats
              <<~EOS
                TailBar runs as a menu bar app (no Dock icon).
                Start it with:
                  tailbar
                Requires Tailscale to be installed and running.
              EOS
            end

            test do
              assert_predicate bin/"tailbar", :exist?
            end
          end
          FORMULA
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/tailbar.rb
          if git diff --cached --quiet; then
            echo "No formula changes."
            exit 0
          fi
          git commit -m "chore: update TailBar ${TAG}"
          git push
